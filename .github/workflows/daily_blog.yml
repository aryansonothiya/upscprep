name: Daily UPSC Blog Updater

on:
  schedule:
    - cron: '0 2 * * *' # Har roz subah 7:30 AM IST (2:00 AM UTC) par apne aap chalega
  workflow_dispatch: # Isse tum jab chaho manually bhi run kar sakte ho

permissions:
  contents: write # GitHub ko file save karne ki permission dene ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai

    - name: Generate Blog Content
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python blogger.py

    - name: Commit and Push Content
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add content.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update UPSC blog" && git push)
